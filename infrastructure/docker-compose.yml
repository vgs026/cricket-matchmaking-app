services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: cricket-matchmaking-postgres
    environment:
      POSTGRES_DB: cricket_matchmaking
      POSTGRES_USER: cricket
      POSTGRES_PASSWORD: cricket_local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cricket -d cricket_matchmaking"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
